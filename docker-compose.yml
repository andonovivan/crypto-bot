services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: crypto_bot
      MARIADB_USER: crypto
      MARIADB_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    command: php artisan bot:run
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  scheduler:
    build: .
    env_file: .env
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  ws-worker:
    build: .
    env_file: .env
    restart: unless-stopped
    command: php artisan bot:ws-prices
    extra_hosts:
      - "fstream.binance.com:18.178.11.87"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  ws-user-data:
    build: .
    env_file: .env
    restart: unless-stopped
    command: php artisan bot:ws-user-data
    extra_hosts:
      - "fstream.binance.com:18.178.11.87"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  dbdata:
