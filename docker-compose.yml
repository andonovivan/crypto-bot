services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      # Passwords come from .env so production can use a strong value without
      # editing docker-compose. Default `secret` keeps existing local setups
      # working unchanged. NOTE: MariaDB only reads these on FIRST init of the
      # dbdata volume — changing them later requires either ALTER USER via SQL
      # or `docker volume rm crypto-bot_dbdata` to reset.
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MARIADB_DATABASE: ${DB_DATABASE:-crypto_bot}
      MARIADB_USER: ${DB_USERNAME:-crypto}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    # InnoDB buffer pool size in bytes. Defaults to 2 GiB so local
    # backtests don't blow the lock table (error 1206) when cursor()
    # streams ~50M kline_history rows. On a production host that doesn't
    # run backtests, set MARIADB_BUFFER_POOL_SIZE=268435456 (256 MiB) in
    # .env — production tables (bot_settings/positions/trades/snapshots)
    # are small and don't need the headroom.
    command: --innodb-buffer-pool-size=${MARIADB_BUFFER_POOL_SIZE:-2147483648}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    command: php artisan bot:run
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  scheduler:
    build: .
    env_file: .env
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  ws-worker:
    build: .
    env_file: .env
    restart: unless-stopped
    command: php artisan bot:ws-prices
    extra_hosts:
      - "fstream.binance.com:18.178.11.87"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  ws-user-data:
    build: .
    env_file: .env
    restart: unless-stopped
    command: php artisan bot:ws-user-data
    extra_hosts:
      - "fstream.binance.com:18.178.11.87"
    volumes:
      - ./storage/logs:/app/storage/logs
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  dbdata:
