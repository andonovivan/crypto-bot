# Production overlay for cloud deployment (Lightsail, Vultr, etc.).
#
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or set COMPOSE_FILE in your shell so plain `docker compose ...` works:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml
#
# Differences from the base config:
#  1. Dashboard (port 8090) inherits the base 0.0.0.0:8090 binding so it's
#     reachable via Tailscale (100.x.x.x) and loopback. **Public access is
#     blocked at the cloud firewall** (Vultr Firewall Group, Lightsail Networking
#     tab, etc.) — only SSH (22) should be open from the internet. Don't
#     deploy without that firewall in place.
#  2. ws-worker / ws-user-data drop the hardcoded `extra_hosts` ISP-DNS
#     workaround — cloud DNS resolves fstream.binance.com correctly and
#     the hardcoded IP could go stale if Binance changes load balancers.

services:
  ws-worker:
    extra_hosts: !override []

  ws-user-data:
    extra_hosts: !override []
